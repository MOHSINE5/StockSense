version: "3.9"
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    # Install or bind-mount Stockfish in the container; set STOCKFISH_PATH to that binary (host env or docker/.env).
    environment:
      - STOCKFISH_PATH=${STOCKFISH_PATH}

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
    depends_on:
      - backend
